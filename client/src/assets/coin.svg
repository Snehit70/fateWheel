<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="coin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin-inner" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#coin-gradient)" stroke="#B8860B" stroke-width="2"/>
  <circle cx="50" cy="50" r="35" fill="url(#coin-inner)" stroke="#B8860B" stroke-width="1" stroke-dasharray="4 2"/>
  
  <text x="50" y="62" font-family="serif" font-weight="bold" font-size="40" text-anchor="middle" fill="#B8860B">₹</text>
</svg>
